services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-https://api.samlogistic.tn}
    image: ${DOCKER_USERNAME:-samlogistic}/samlogistic-frontend:${TAG:-latest}
    container_name: sam-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
