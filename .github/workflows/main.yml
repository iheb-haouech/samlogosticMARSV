name: Vanlog CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.18.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Build and test
        run: |
          # ******************* Backend **********************
          cd backend/
          cat .env.example >> .env

          echo -e "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo -e "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
          echo -e "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> .env
          echo -e "MAIL_USER=${{ secrets.MAIL_USER }}" >> .env
          echo -e "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo -e "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env
          echo -e "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo -e "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo -e "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo -e "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env

          docker-compose -f docker-compose.prod.yaml build

          # ******************* Frontend **********************
          cd ../frontend/
          cat .env.example >> .env
          echo -e "VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}" >> .env
          docker-compose --profile prod build

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        run: |
          # ******************* Backend **********************
          cd backend/
          docker-compose -f docker-compose.prod.yaml push

          # ******************* Frontend **********************
          cd ../frontend/
          docker-compose --profile prod push

  deploy:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: SSH into VPS and deploy
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USERNAME: ${{ secrets.HOST_USERNAME }}
          SSH_PASSWORD: ${{ secrets.HOST_PASSWORD }}
        run: |
          sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no $SSH_USERNAME@$SSH_HOST '
          sudo rm -rf vanlog/
          sudo apt-get update
          git clone git@github.com:Hassenamri005/vanlog.git

          ################################################# Backend ##########################################
          cd vanlog/backend/
          cp .env.example .env

          echo -e "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo -e "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
          echo -e "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> .env
          echo -e "MAIL_USER=${{ secrets.MAIL_USER }}" >> .env
          echo -e "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo -e "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env
          echo -e "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo -e "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo -e "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo -e "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env

          # Pull the latest images from Docker Hub
          docker-compose -f docker-compose.prod.yaml pull 
          docker-compose -f docker-compose.prod.yaml up -d

          ################################################# Frontend ##########################################
          cd ../frontend/
          cp .env.example .env
          echo -e "VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}" >> .env

          # Pull the latest images from Docker Hub
          docker-compose --profile prod pull
          docker-compose --profile prod up -d
          '
