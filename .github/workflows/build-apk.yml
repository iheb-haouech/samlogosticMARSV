name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build web assets
        run: |
          cd frontend
          npm run build

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x frontend/android/gradlew

      - name: Generate self-signed keystore
        run: |
          keytool -genkeypair -v -keystore frontend/android/app/release-key.jks \
            -alias sam-logistic-key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass samlogistic123 \
            -keypass samlogistic123 \
            -dname "CN=SAM LOGISTIC, OU=Dev, O=SAM, L=Tunis, S=Tunisia, C=TN" \
            -storetype JKS

      - name: Build Signed APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SamLogisticApp-signed.apk
          path: frontend/android/app/build/outputs/apk/release/*.apk