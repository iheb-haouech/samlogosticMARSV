services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${DOCKER_USERNAME:-samlogistic}/samlogistic-backend:${TAG:-latest}
    container_name: sam-backend
    restart: always
    ports:
      - "127.0.0.1:${PORT:-6001}:${PORT:-6001}"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-6001}
    command: ["sh", "./scripts/run_app_prod.sh"]
    networks:
      - app_default

networks:
  app_default:
    external: true
