services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${DOCKER_USERNAME:-samlogistic}/samlogistic-backend:${TAG:-latest}
    container_name: sam-backend
    restart: always
    ports:
      - "127.0.0.1:${PORT:-6001}:${PORT:-6001}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://samlogistic:post123@postgres:5432/samlogistic?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      PORT: ${PORT:-6001}
    command: ["./scripts/run_app_prod.sh"]
