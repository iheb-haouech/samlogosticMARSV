services:
  postgres:
    image: postgres:13.5
    container_name: sam-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-samlogistic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-samlogistic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sam-backend
    restart: always
    ports:
      - "127.0.0.1:6001:6001"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-6001}
    depends_on:
      - postgres
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-https://api.samlogistic.tn}
    container_name: sam-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    volumes:
      - /var/www/samlogistic/app/SamLogisticApp.apk:/usr/share/nginx/html/SamLogisticApp.apk:ro

volumes:
  postgres_data:
